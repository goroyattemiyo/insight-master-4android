<!DOCTYPE html>

<html lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Insight Editorial - Analyzing...</title>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes subtle-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-subtle-float {
            animation: subtle-float 6s ease-in-out infinite;
        }
        .progress-shine {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            background-size: 200% 100%;
            animation: shine 2s infinite;
        }
        @keyframes shine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-surface font-body min-h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Top Navigation Anchor (Non-interactive for loading) -->
<header class="bg-[#f8f9fa]/80 dark:bg-slate-900/80 backdrop-blur-xl flex justify-between items-center px-6 h-16 w-full fixed top-0 z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#005FB8]" data-icon="auto_awesome">auto_awesome</span>
<h1 class="text-xl font-black text-[#005FB8] font-headline tracking-tight">The Insight Editorial</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-slate-500" data-icon="notifications">notifications</span>
</div>
</header>
<!-- Main Content: Loading State -->
<main class="flex flex-col items-center justify-center w-full max-w-2xl px-6 space-y-16">
<!-- Center Visual -->
<div class="relative flex items-center justify-center">
<!-- Background Decorative Glow -->
<div class="absolute w-64 h-64 bg-primary-container/10 rounded-full blur-3xl animate-pulse"></div>
<!-- Main Illustration / Card -->
<div class="relative bg-surface-container-lowest rounded-xl p-8 flex flex-col items-center space-y-8 animate-subtle-float shadow-[0_12px_32px_rgba(0,72,141,0.08)]">
<div class="w-24 h-24 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-5xl" data-icon="analytics" style="font-variation-settings: 'FILL' 1;">analytics</span>
</div>
<div class="text-center space-y-2">
<h2 class="text-2xl font-headline font-bold text-on-surface tracking-tight">投稿内容を分析中...</h2>
<p class="text-on-surface-variant text-sm font-medium">数値抽出中... 68%</p>
</div>
<!-- Circular Progress with Editorial Style -->
<div class="relative w-full px-8 pb-4">
<div class="h-2 w-full bg-secondary-fixed rounded-full overflow-hidden">
<div class="h-full bg-primary w-[68%] rounded-full progress-shine transition-all duration-700 ease-out"></div>
</div>
</div>
</div>
</div>
<!-- Bento-style Insight Section (Disabled/Ghost State for Loading) -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full opacity-40 pointer-events-none">
<div class="md:col-span-2 bg-surface-container-low rounded-lg p-6 flex flex-col space-y-4">
<div class="h-4 w-32 bg-surface-container-highest rounded"></div>
<div class="h-12 w-full bg-surface-container-highest rounded-lg"></div>
</div>
<div class="bg-surface-container-low rounded-lg p-6 flex flex-col space-y-4 items-center justify-center">
<div class="h-10 w-10 bg-surface-container-highest rounded-full"></div>
<div class="h-4 w-16 bg-surface-container-highest rounded"></div>
</div>
</div>
<!-- Editorial Tip (Footer Area) -->
<div class="w-full flex flex-col items-center space-y-6 pt-12">
<div class="flex items-center gap-3 px-6 py-3 bg-surface-container-low rounded-full">
<span class="material-symbols-outlined text-primary text-xl" data-icon="lightbulb">lightbulb</span>
<p class="text-sm font-medium text-on-surface-variant">
                    ヒント：投稿の時間を変えると反応が変わるかもしれません
                </p>
</div>
<div class="flex items-center gap-1">
<div class="w-1.5 h-1.5 bg-primary rounded-full animate-bounce" style="animation-delay: 0s"></div>
<div class="w-1.5 h-1.5 bg-primary rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
<div class="w-1.5 h-1.5 bg-primary rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
</div>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-8 pb-6 pt-2 bg-[#ffffff]/80 dark:bg-slate-950/80 backdrop-blur-xl rounded-t-[3rem] shadow-[0_-12px_32px_rgba(0,72,141,0.08)]">
<div class="flex flex-col items-center justify-center text-slate-400 p-2 font-['Inter'] text-xs font-semibold">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span>ホーム</span>
</div>
<div class="flex flex-col items-center justify-center bg-gradient-to-br from-[#00488d] to-[#005fb8] text-white rounded-full w-16 h-16 -mt-8 shadow-lg shadow-[#00488d]/30 font-['Inter'] text-xs font-semibold">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span>履歴</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 p-2 font-['Inter'] text-xs font-semibold">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span>設定</span>
</div>
</nav>
<!-- Background Decoration -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] bg-secondary/5 rounded-full blur-[120px]"></div>
</div>
