<h1 class="text-xl font-black text-[#005FB8] dark:text-[#0070d6] font-['Manrope'] tracking-tight">The Insight Editorial</h1>

<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-[#f3f4f5] dark:hover:bg-slate-800 transition-colors Active: opacity-70 transition-opacity">

</button>
</header>
<main class="min-h-[calc(100vh-140px)] flex flex-col items-center justify-center px-6 py-12 space-y-16">

<div class="w-full max-w-2xl text-center space-y-6">
<div class="inline-flex items-center gap-2 px-4 py-2 bg-primary-fixed text-on-primary-fixed-variant rounded-full text-xs font-bold tracking-widest uppercase">

</h2>
<p class="text-on-surface-variant text-lg max-w-md mx-auto font-medium">
                データ入力を省き、インスピレーションへ。<br/>
                あなたの投稿を「一流」の戦略に変える。
            </p>
</div>

<div class="relative w-full max-w-md">

<div class="absolute inset-0 bg-secondary-fixed/20 blur-3xl -z-10 rounded-full scale-150 transform"></div>

<span class="material-symbols-outlined text-7xl md:text-8xl mb-4" style="font-variation-settings: 'FILL' 0;">add_a_photo</span>
<span class="text-xl md:text-2xl font-headline font-bold">スクショを選択</span>
<!-- Decorative subtle glow -->
<div class="absolute -inset-1 bg-white/10 rounded-xl blur opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>

</div>
</div>
</div>
</div>

</button>
